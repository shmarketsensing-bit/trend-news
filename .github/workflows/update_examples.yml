name: Update Selected Examples

on:
  schedule:
    # 매주 일요일 한국시간(KST) 07:00 = UTC 22:00(토요일)
    - cron: '0 22 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:   # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build selected-examples from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python -m core.notion_learn

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts/selected_examples.txt
          git diff --cached --quiet || git commit -m "선정완료 사례 자동 갱신"
          git push
